# Cloud Build for Flutter Frontend
# Builds and deploys to Firebase Hosting (free tier)

steps:
  # Build Flutter web app
  - name: 'ghcr.io/nicholashoban/flutter-builder:stable'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        flutter pub get
        flutter build web --release --web-renderer canvaskit \
          --dart-define=API_BASE_URL=https://karriova-backend-HASH-uc.a.run.app

  # Deploy to Firebase Hosting
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting --project $PROJECT_ID --token $$FIREBASE_TOKEN

options:
  logging: CLOUD_LOGGING_ONLY

# Secrets for Firebase token
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_TOKEN/versions/latest
      env: 'FIREBASE_TOKEN'
